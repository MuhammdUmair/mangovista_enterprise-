```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mango Vista</title>

    <link rel="stylesheet" href="style.css">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }

        .container {
            max-width: 600px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: #ff9800;
            margin-bottom: 10px;
        }

        p {
            text-align: center;
            color: #777;
            margin-bottom: 30px;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            margin-top: 5px;
            box-sizing: border-box;
        }

        input[readonly] {
            background: #f3f3f3;
        }

        button {
            width: 100%;
            margin-top: 25px;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: #ff9800;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }

        button:hover {
            background: #f57c00;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            color: gray;
            font-size: 14px;
        }

        @media(max-width:600px){
            .container{
                margin:20px;
                padding:20px;
            }
        }
    </style>
</head>

<body>

<div class="container">

    <h1>🥭 Mango Vista</h1>

    <p>Fresh Products Order Form</p>

    <form id="orderForm">

        <label>Customer Name</label>
        <input
            type="text"
            id="name"
            required>

        <label>Phone Number</label>
        <input
            type="text"
            id="phone"
            required>

        <label>Select Product</label>
        <select id="product" required>
            <option value="">
                Loading Products...
            </option>
        </select>

        <label>Quantity</label>
        <input
            type="number"
            id="quantity"
            min="1"
            required>

        <label>Total Price</label>
        <input
            type="text"
            id="total"
            readonly>

        <button type="submit">
            Submit Order
        </button>

    </form>

    <div class="footer">
        Mango Vista Order System
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
```
