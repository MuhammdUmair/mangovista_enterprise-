<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mango Vista Enterprise</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
<div class="container py-4">
<div class="card shadow p-4">
<h2 class="text-center">Mango Vista Order Management</h2>

<input class="form-control mb-2" id="name" placeholder="Customer Name">
<input class="form-control mb-2" id="phone" placeholder="Phone Number">
<textarea class="form-control mb-2" id="address" placeholder="Address"></textarea>

<select class="form-select mb-2" id="state">
<option>Dubai</option>
<option>Sharjah</option>
</select>

<input class="form-control mb-2" type="number" id="boxes" placeholder="Boxes">
<input class="form-control mb-2" type="number" id="price" value="45">

<select class="form-select mb-2" id="slot">
<option>09AM-01PM</option>
<option>02PM-05PM</option>
</select>

<input class="form-control mb-2" type="date" id="date">

<h4>Total AED: <span id="total">0</span></h4>

<button class="btn btn-success" onclick="calculate()">Calculate</button>
<button class="btn btn-primary" onclick="downloadPDF()">Download Bill</button>

<hr>
<p>Delivery within Dubai is completed within one day.</p>
<p>Outside Dubai orders are confirmed on weekends only.</p>
</div>
</div>
<script src="script.js"></script>
</body>
</html>
